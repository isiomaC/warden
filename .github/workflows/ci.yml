name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: npx tsc --noEmit

  test-bun:
    name: Unit Tests (Bun)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: npx vitest run

      - name: Run tests with coverage
        continue-on-error: true
        run: npx vitest run --coverage

  test-node:
    name: Unit Tests (Node.js 22)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Run tests with coverage
        continue-on-error: true
        run: npx vitest run --coverage

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [typecheck, test-bun, test-node]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: warden:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify health endpoint
        run: |
          # Create minimal config for smoke test (v2 schema)
          cat > /tmp/warden-ci-config.yml << 'EOF'
          version: "2"
          meta:
            environment: "ci"
            sessionApprovalRequired: false
          policies: []
          EOF

          mkdir -p /tmp/warden-persist

          docker run --rm -d \
            --name warden-test \
            -v /tmp/warden-ci-config.yml:/app/warden.config.yml:ro \
            -v /tmp/warden-persist:/app/.warden \
            -p 7429:7429 \
            warden:ci

          # Wait for server to start
          for i in $(seq 1 15); do
            if curl -sf http://localhost:7429/health > /dev/null 2>&1; then
              echo "Health check passed"
              curl -s http://localhost:7429/health | tee /dev/stderr
              docker stop warden-test
              exit 0
            fi
            echo "Waiting for server... ($i/15)"
            sleep 2
          done

          echo "Server failed to start. Logs:"
          docker logs warden-test
          docker stop warden-test
          exit 1
